name: CI

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # =================== Linux (JDK 8–25) ===================
          - os: ubuntu-latest
            java: '8'
            distribution: temurin
          - os: ubuntu-latest
            java: '9'
            distribution: zulu
          - os: ubuntu-latest
            java: '10'
            distribution: zulu
          - os: ubuntu-latest
            java: '11'
            distribution: temurin
          - os: ubuntu-latest
            java: '12'
            distribution: zulu
          - os: ubuntu-latest
            java: '13'
            distribution: zulu
          - os: ubuntu-latest
            java: '14'
            distribution: zulu
          - os: ubuntu-latest
            java: '15'
            distribution: zulu
          - os: ubuntu-latest
            java: '16'
            distribution: zulu
          - os: ubuntu-latest
            java: '17'
            distribution: temurin
          - os: ubuntu-latest
            java: '18'
            distribution: zulu
          - os: ubuntu-latest
            java: '19'
            distribution: zulu
          - os: ubuntu-latest
            java: '20'
            distribution: zulu
          - os: ubuntu-latest
            java: '21'
            distribution: temurin
          - os: ubuntu-latest
            java: '22'
            distribution: zulu
          - os: ubuntu-latest
            java: '23'
            distribution: zulu
          - os: ubuntu-latest
            java: '24'
            distribution: temurin
          - os: ubuntu-latest
            java: '25'
            distribution: temurin

          # =================== macOS (JDK 11–25, skip 8/9/10/12/14 — no ARM Zulu builds) ===================
          - os: macos-latest
            java: '11'
            distribution: temurin
          - os: macos-latest
            java: '13'
            distribution: zulu
          - os: macos-latest
            java: '15'
            distribution: zulu
          - os: macos-latest
            java: '16'
            distribution: zulu
          - os: macos-latest
            java: '17'
            distribution: temurin
          - os: macos-latest
            java: '18'
            distribution: zulu
          - os: macos-latest
            java: '19'
            distribution: zulu
          - os: macos-latest
            java: '20'
            distribution: zulu
          - os: macos-latest
            java: '21'
            distribution: temurin
          - os: macos-latest
            java: '22'
            distribution: zulu
          - os: macos-latest
            java: '23'
            distribution: zulu
          - os: macos-latest
            java: '24'
            distribution: temurin
          - os: macos-latest
            java: '25'
            distribution: temurin

          # =================== Windows (JDK 8–25) ===================
          - os: windows-latest
            java: '8'
            distribution: temurin
          - os: windows-latest
            java: '9'
            distribution: zulu
          - os: windows-latest
            java: '10'
            distribution: zulu
          - os: windows-latest
            java: '11'
            distribution: temurin
          - os: windows-latest
            java: '12'
            distribution: zulu
          - os: windows-latest
            java: '13'
            distribution: zulu
          - os: windows-latest
            java: '14'
            distribution: zulu
          - os: windows-latest
            java: '15'
            distribution: zulu
          - os: windows-latest
            java: '16'
            distribution: zulu
          - os: windows-latest
            java: '17'
            distribution: temurin
          - os: windows-latest
            java: '18'
            distribution: zulu
          - os: windows-latest
            java: '19'
            distribution: zulu
          - os: windows-latest
            java: '20'
            distribution: zulu
          - os: windows-latest
            java: '21'
            distribution: temurin
          - os: windows-latest
            java: '22'
            distribution: zulu
          - os: windows-latest
            java: '23'
            distribution: zulu
          - os: windows-latest
            java: '24'
            distribution: temurin
          - os: windows-latest
            java: '25'
            distribution: temurin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.distribution }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and run unit tests
        run: mvn -B clean test

      - name: Package agent jar
        run: mvn -B package -DskipTests

      - name: Run E2E integration tests
        run: mvn -B failsafe:integration-test failsafe:verify
        # JDK 10 has JDWP port discovery issues (ManagementFactory init failure
        # + no fallback port detection). Unit tests pass but E2E requires JDWP.
        continue-on-error: ${{ matrix.java == '10' }}

      - name: Generate Javadoc
        run: mvn -B javadoc:javadoc
        continue-on-error: true

  stress:
    name: Stress Test (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # =================== Linux (JDK 8–25) ===================
          - os: ubuntu-latest
            java: '8'
            distribution: temurin
          - os: ubuntu-latest
            java: '9'
            distribution: zulu
          - os: ubuntu-latest
            java: '10'
            distribution: zulu
          - os: ubuntu-latest
            java: '11'
            distribution: temurin
          - os: ubuntu-latest
            java: '12'
            distribution: zulu
          - os: ubuntu-latest
            java: '13'
            distribution: zulu
          - os: ubuntu-latest
            java: '14'
            distribution: zulu
          - os: ubuntu-latest
            java: '15'
            distribution: zulu
          - os: ubuntu-latest
            java: '16'
            distribution: zulu
          - os: ubuntu-latest
            java: '17'
            distribution: temurin
          - os: ubuntu-latest
            java: '18'
            distribution: zulu
          - os: ubuntu-latest
            java: '19'
            distribution: zulu
          - os: ubuntu-latest
            java: '20'
            distribution: zulu
          - os: ubuntu-latest
            java: '21'
            distribution: temurin
          - os: ubuntu-latest
            java: '22'
            distribution: zulu
          - os: ubuntu-latest
            java: '23'
            distribution: zulu
          - os: ubuntu-latest
            java: '24'
            distribution: temurin
          - os: ubuntu-latest
            java: '25'
            distribution: temurin

          # =================== macOS (JDK 11–25, skip 8/9/10/12/14 — no ARM Zulu builds) ===================
          - os: macos-latest
            java: '11'
            distribution: temurin
          - os: macos-latest
            java: '13'
            distribution: zulu
          - os: macos-latest
            java: '15'
            distribution: zulu
          - os: macos-latest
            java: '16'
            distribution: zulu
          - os: macos-latest
            java: '17'
            distribution: temurin
          - os: macos-latest
            java: '18'
            distribution: zulu
          - os: macos-latest
            java: '19'
            distribution: zulu
          - os: macos-latest
            java: '20'
            distribution: zulu
          - os: macos-latest
            java: '21'
            distribution: temurin
          - os: macos-latest
            java: '22'
            distribution: zulu
          - os: macos-latest
            java: '23'
            distribution: zulu
          - os: macos-latest
            java: '24'
            distribution: temurin
          - os: macos-latest
            java: '25'
            distribution: temurin

          # =================== Windows (JDK 8–25) ===================
          - os: windows-latest
            java: '8'
            distribution: temurin
          - os: windows-latest
            java: '9'
            distribution: zulu
          - os: windows-latest
            java: '10'
            distribution: zulu
          - os: windows-latest
            java: '11'
            distribution: temurin
          - os: windows-latest
            java: '12'
            distribution: zulu
          - os: windows-latest
            java: '13'
            distribution: zulu
          - os: windows-latest
            java: '14'
            distribution: zulu
          - os: windows-latest
            java: '15'
            distribution: zulu
          - os: windows-latest
            java: '16'
            distribution: zulu
          - os: windows-latest
            java: '17'
            distribution: temurin
          - os: windows-latest
            java: '18'
            distribution: zulu
          - os: windows-latest
            java: '19'
            distribution: zulu
          - os: windows-latest
            java: '20'
            distribution: zulu
          - os: windows-latest
            java: '21'
            distribution: temurin
          - os: windows-latest
            java: '22'
            distribution: zulu
          - os: windows-latest
            java: '23'
            distribution: zulu
          - os: windows-latest
            java: '24'
            distribution: temurin
          - os: windows-latest
            java: '25'
            distribution: temurin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.distribution }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Package agent jar
        run: mvn -B package -DskipTests

      - name: Run stress tests (20 repetitions each)
        run: mvn -B failsafe:integration-test failsafe:verify -Pstress
