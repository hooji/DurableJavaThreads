name: CI

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            java: '8'
            distribution: temurin
          - os: ubuntu-latest
            java: '9'
            distribution: zulu
          - os: ubuntu-latest
            java: '11'
            distribution: temurin
          - os: ubuntu-latest
            java: '25'
            distribution: temurin
          # macOS (earliest available is 11 on ARM runners)
          - os: macos-latest
            java: '11'
            distribution: temurin
          - os: macos-latest
            java: '25'
            distribution: temurin
          # Windows
          - os: windows-latest
            java: '8'
            distribution: temurin
          - os: windows-latest
            java: '9'
            distribution: zulu
          - os: windows-latest
            java: '11'
            distribution: temurin
          - os: windows-latest
            java: '25'
            distribution: temurin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.distribution }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and run unit tests
        run: mvn -B clean test

      - name: Package agent jar
        run: mvn -B package -DskipTests

      - name: Run E2E integration tests
        run: mvn -B failsafe:integration-test failsafe:verify

      - name: Generate Javadoc
        run: mvn -B javadoc:javadoc

  stress:
    name: Stress Test (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            java: '8'
            distribution: temurin
          - os: ubuntu-latest
            java: '9'
            distribution: zulu
          - os: ubuntu-latest
            java: '11'
            distribution: temurin
          - os: ubuntu-latest
            java: '25'
            distribution: temurin
          # macOS
          - os: macos-latest
            java: '11'
            distribution: temurin
          - os: macos-latest
            java: '25'
            distribution: temurin
          # Windows
          - os: windows-latest
            java: '8'
            distribution: temurin
          - os: windows-latest
            java: '9'
            distribution: zulu
          - os: windows-latest
            java: '11'
            distribution: temurin
          - os: windows-latest
            java: '25'
            distribution: temurin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.distribution }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Package agent jar
        run: mvn -B package -DskipTests

      - name: Run stress tests (20 repetitions each)
        run: mvn -B failsafe:integration-test failsafe:verify -Pstress
